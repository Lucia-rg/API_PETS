paths:
  /api/users:
    get:
      summary: Obtiene todos los usuarios.
      tags:
        - Users
      responses:
        "200":
          description: Lista de usuarios obtenida con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserResponse'
        "500":
          description: Error interno de conexión a la base de datos (DATABASE_ERROR).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'

  /api/users/{uid}:
    get:
      summary: Obtiene un usuario específico por su ID.
      tags:
        - Users
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
          description: ID del usuario en MongoDB.
      responses:
        "200":
          description: Usuario encontrado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    $ref: '#/components/schemas/UserResponse'
        "400":
          description: El formato del ID proporcionado es inválido (CastError).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'
        "404":
          description: El usuario no existe en la base de datos (ROUTING_ERROR).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'

    put:
      summary: Actualiza la información de un usuario.
      tags:
        - Users
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
          description: ID del usuario en MongoDB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateInput'
      responses:
        "200":
          description: Usuario actualizado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: User updated
        "404":
          description: El usuario no existe en la base de datos (ROUTING_ERROR).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'

    delete:
      summary: Elimina un usuario por su ID.
      tags:
        - Users
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
          description: ID del usuario en MongoDB.
      responses:
        "200":
          description: Usuario eliminado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: User deleted
        "404":
          description: El usuario no existe en la base de datos (ROUTING_ERROR).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'

components:
  schemas:
    UserResponse:
      type: object
      description: Objeto de usuario procesado por el DTO (sin exponer la contraseña).
      properties:
        _id:
          type: string
          example: 64b1f2e3c9e8a1b2c3d4e5f6
        first_name:
          type: string
          example: Lucía
        last_name:
          type: string
          example: Rodríguez
        email:
          type: string
          example: lucia.rodriguez@correo.com
        role:
          type: string
          example: user
        pets:
          type: array
          items:
            type: string
            description: IDs de las mascotas adoptadas.

    UserUpdateInput:
      type: object
      description: Campos opcionales enviados en el body para actualizar un usuario.
      properties:
        first_name:
          type: string
          example: Lucía
        last_name:
          type: string
          example: Rodríguez
        role:
          type: string
          example: user

    ErrorResponseStandard:
      type: object
      properties:
        status:
          type: string
          example: error
        error:
          type: string
          example: "User not found"