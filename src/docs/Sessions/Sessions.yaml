paths:
  /api/sessions/register:
    post:
      summary: Registra un nuevo usuario en el sistema.
      tags:
        - Sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        "200":
          description: Usuario registrado exitosamente. Devuelve el ID del usuario.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: string
                    description: ID del usuario creado.
                    example: 64b1f2e3c9e8a1b2c3d4e5f6
        "400":
          description: Faltan datos obligatorios o el usuario ya existe (INVALID_TYPES_ERROR).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse400'

  /api/sessions/login:
    post:
      summary: Inicia sesión y establece una cookie con el JWT.
      tags:
        - Sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        "200":
          description: Login exitoso. Se establece la 'coderCookie'.
          headers:
            Set-Cookie:
              schema:
                type: string
                example: coderCookie=abc123token...; Max-Age=3600; HttpOnly
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "400":
          description: Valores incompletos para el login (INVALID_TYPES_ERROR).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse400'
        "401":
          description: Credenciales inválidas o usuario inexistente (AUTH_ERROR).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'

  /api/sessions/current:
    get:
      summary: Obtiene el usuario actual a partir de la 'coderCookie'.
      tags:
        - Sessions
      responses:
        "200":
          description: Retorna el payload del usuario logueado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    $ref: '#/components/schemas/UserPayload'
        "401":
          description: No autorizado. Cookie no encontrada o token inválido/expirado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'

  /api/sessions/logout:
    get:
      summary: Cierra la sesión del usuario y destruye la cookie.
      tags:
        - Sessions
      responses:
        "200":
          description: Sesión cerrada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Logged out

  /api/sessions/unprotectedLogin:
    post:
      summary: Inicia sesión de prueba estableciendo la 'unprotectedCookie'.
      tags:
        - Sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        "200":
          description: Login sin protección exitoso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Unprotected Logged in
        "400":
          description: Valores incompletos (INVALID_TYPES_ERROR).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse400'
        "401":
          description: Credenciales inválidas o usuario inexistente (AUTH_ERROR).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'

  /api/sessions/unprotectedCurrent:
    get:
      summary: Obtiene el usuario actual a partir de la 'unprotectedCookie'.
      tags:
        - Sessions
      responses:
        "200":
          description: Retorna el payload del usuario.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    $ref: '#/components/schemas/UserPayload'
        "401":
          description: No autorizado. Cookie no encontrada o token inválido/expirado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'

components:
  schemas:
    RegisterInput:
      type: object
      required: [first_name, last_name, email, password]
      properties:
        first_name:
          type: string
          example: Lucía
        last_name:
          type: string
          example: Rodríguez
        email:
          type: string
          example: lucia.rodriguez@correo.com
        password:
          type: string
          example: coder123
          
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: lucia.rodriguez@correo.com
        password:
          type: string
          example: coder123

    LoginResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Logged in

    UserPayload:
      type: object
      description: Información extraída del JWT.
      properties:
        name:
          type: string
          example: Lucía Rodríguez
        role:
          type: string
          example: user
        email:
          type: string
          example: lucia.rodriguez@correo.com

    ErrorResponse400:
      type: object
      properties:
        status:
          type: string
          example: error
        error:
          type: string
          example: "Invalid types error"
        cause:
          type: string
          example: "Missing required fields: email, password"

    ErrorResponseStandard:
      type: object
      properties:
        status:
          type: string
          example: error
        error:
          type: string
          example: "Auth error"