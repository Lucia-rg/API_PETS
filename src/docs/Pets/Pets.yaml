paths:
  /api/pets:
    get:
      summary: Obtiene todas las mascotas.
      tags:
        - Pets
      responses:
        "200":
          description: Lista de mascotas obtenida con éxito.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pet'
        "500":
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'
          
    post:
      summary: Crea una mascota sin imagen.
      tags:
        - Pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetInput'
      responses:
        "200":
          description: Mascota creada exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetSuccessResponse'
        "400":
          description: Error de validación por valores incompletos (INVALID_TYPES_ERROR).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse400'

  /api/pets/withimage:
    post:
      summary: Crea una mascota con carga de imagen.
      tags:
        - Pets
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, specie, birthDate]
              properties:
                name:
                  type: string
                  example: "Moty"
                specie:
                  type: string
                  example: "Dog"
                birthDate:
                  type: string
                  format: date
                  example: "2020-01-01"
                image:
                  type: string
                  format: binary
                  description: Imagen binaria de la mascota
      responses:
        "200":
          description: Mascota creada con imagen exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetSuccessResponse'
        "400":
          description: Error de validación por valores incompletos (INVALID_TYPES_ERROR).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse400'

  /api/pets/{pid}:
    put:
      summary: Actualiza una mascota por ID.
      tags:
        - Pets
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: string
          description: ID de la mascota en MongoDB.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetInput'
      responses:
        "200":
          description: Mascota actualizada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: pet updated
        "400":
          description: Formato de ID inválido (CastError).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'
        "404":
          description: Mascota no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'
          
    delete:
      summary: Elimina una mascota por ID.
      tags:
        - Pets
      parameters:
        - name: pid
          in: path
          required: true
          schema:
            type: string
          description: ID de la mascota en MongoDB.
      responses:
        "200":
          description: Mascota eliminada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: pet deleted
        "400":
          description: Formato de ID inválido (CastError).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'
        "404":
          description: Mascota no encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseStandard'

components:
  schemas:
    Pet:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        specie:
          type: string
        birthDate:
          type: string
          format: date
        adopted:
          type: boolean
        owner:
          type: string
          nullable: true
        image:
          type: string
    
    PetInput:
      type: object
      required: [name, specie, birthDate]
      properties:
        name:
          type: string
          example: "Moty"
        specie:
          type: string
          example: "Dog"
        birthDate:
          type: string
          format: date
          example: "2020-01-01"

    PetSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        payload:
          $ref: '#/components/schemas/Pet'

    ErrorResponse400:
      type: object
      properties:
        status:
          type: string
          example: error
        error:
          type: string
          example: "Pet creation error"
        cause:
          type: string
          example: "Missing required fields"

    ErrorResponseStandard:
      type: object
      properties:
        status:
          type: string
          example: error
        error:
          type: string
          example: "Invalid pet ID format"